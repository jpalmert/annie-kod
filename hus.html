<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Annies Husbyggare!</title>
    <style>
        * { touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        h1 {
            color: #ff77aa;
            font-size: 1.6em;
            margin: 8px 0 4px;
            text-shadow: 0 0 15px rgba(255, 119, 170, 0.4);
        }
        canvas {
            border: 3px solid #ff77aa;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 119, 170, 0.3);
        }
        #toolbar {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 720px;
        }
        .tab-btn {
            padding: 8px 16px;
            font-size: 1em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .tab-btn:hover { transform: scale(1.05); }
        .tab-btn.active { box-shadow: 0 0 12px rgba(255,255,255,0.4); transform: scale(1.08); }
        #btn-mobler { background: #ff9933; color: #000; }
        #btn-kok { background: #ffaa55; color: #000; }
        #btn-badrum { background: #77bbdd; color: #000; }
        #btn-dekor { background: #33ccff; color: #000; }
        #btn-vagar { background: #77dd77; color: #000; }
        #btn-golv { background: #ddaa77; color: #000; }
        #btn-radera { background: #ff4444; color: #fff; }
        #hint {
            color: #999;
            font-size: 0.85em;
            margin-top: 4px;
            text-align: center;
        }
        @media (max-width: 750px) {
            h1 { font-size: 1.2em; margin: 4px 0 2px; }
            .tab-btn { padding: 6px 12px; font-size: 0.85em; }
            canvas { max-width: 100vw; }
            #hint { font-size: 0.75em; }
        }
    </style>
</head>
<body>
    <h1>🏠 Annies Husbyggare! 🏠</h1>
    <canvas id="game" width="700" height="520"></canvas>
    <div id="toolbar">
        <button class="tab-btn active" id="btn-mobler" onclick="setTab('mobler')">🛋️ Möbler</button>
        <button class="tab-btn" id="btn-kok" onclick="setTab('kok')">🍳 Kök</button>
        <button class="tab-btn" id="btn-badrum" onclick="setTab('badrum')">🚿 Badrum</button>
        <button class="tab-btn" id="btn-dekor" onclick="setTab('dekor')">🖼️ Dekor</button>
        <button class="tab-btn" id="btn-vagar" onclick="setTab('vagar')">🎨 Väggar</button>
        <button class="tab-btn" id="btn-golv" onclick="setTab('golv')">🟫 Golv</button>
        <button class="tab-btn" id="btn-radera" onclick="setTab('radera')">🗑️ Radera</button>
        <span id="size-controls" style="display:none; align-items:center; gap:4px;">
            <button class="tab-btn" style="background:#555;color:#fff;padding:6px 12px;" onclick="changeSize(-0.25)">−</button>
            <span id="size-label" style="color:#fff;font-weight:bold;min-width:40px;text-align:center;">100%</span>
            <button class="tab-btn" style="background:#555;color:#fff;padding:6px 12px;" onclick="changeSize(0.25)">+</button>
        </span>
    </div>
    <div id="hint">Piltangenter = gå | Gå till en dörr för att byta rum | Klicka för att placera grejer!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const W = canvas.width;
        const H = canvas.height;
        const FLOOR_Y = H * 0.40; // golvet börjar här
        const PAL_H = 55;         // palettens höjd

        // === RUMMEN ===
        // Dörrar: position på väggen, och vilket rum de leder till
        const rooms = [
            {
                name: 'Vardagsrum', wallColor: '#ffe6cc', floorColor: '#c4956a',
                items: [],
                doors: [
                    { wall: 'right', label: 'Kök →', toRoom: 1 },
                    { wall: 'stairsUp', label: 'Sovrum ↑', toRoom: 2 },
                ]
            },
            {
                name: 'Kök', wallColor: '#e6ffe6', floorColor: '#b5a67a',
                items: [],
                doors: [
                    { wall: 'left', label: '← Vardagsrum', toRoom: 0 },
                    { wall: 'stairsUp', label: 'Badrum ↑', toRoom: 3 },
                ]
            },
            {
                name: 'Sovrum', wallColor: '#cce6ff', floorColor: '#c4956a',
                items: [],
                doors: [
                    { wall: 'right', label: 'Badrum →', toRoom: 3 },
                    { wall: 'stairsDown', label: 'Vardagsrum ↓', toRoom: 0 },
                ]
            },
            {
                name: 'Badrum', wallColor: '#ffe6f0', floorColor: '#d9d9d9',
                items: [],
                doors: [
                    { wall: 'left', label: '← Sovrum', toRoom: 2 },
                    { wall: 'stairsDown', label: 'Kök ↓', toRoom: 1 },
                ]
            },
        ];

        let currentRoom = 0;

        // Trappans mått - sidovy, snett från höger
        const STAIR_W = 180;
        const STAIR_STEP_W = 180;

        // Trappan går snett: botten till höger vid golvet, toppen uppe till vänster
        // stairsUp: botten vid golvet höger, toppen försvinner uppåt vänster
        // stairsDown: toppen vid golvet vänster, botten försvinner nedåt höger
        const HOLE_W = 82; // bredden på hålet i golvet
        const HOLE_H = 82; // höjden på hålet

        function getStairPath(door) {
            if (door.wall === 'stairsUp') {
                // Snett längs väggen: från golvet höger, upp till vänster
                return {
                    bottomX: W / 2 + STAIR_W / 2,   bottomY: FLOOR_Y,
                    topX: W / 2 - STAIR_W / 2,      topY: 0
                };
            } else {
                // Hål i golvet: rakt ner
                return {
                    topX: W / 2,                     topY: FLOOR_Y,
                    bottomX: W / 2,                  bottomY: H - PAL_H
                };
            }
        }

        // Beräkna spelarens Y baserat på X i trappan
        function getStairY(door, px) {
            const sp = getStairPath(door);
            if (door.wall === 'stairsUp') {
                // Snett: Y beror på X
                const t = (px - sp.topX) / (sp.bottomX - sp.topX);
                return sp.topY + t * (sp.bottomY - sp.topY);
            } else {
                // Rakt ner: Y styrs inte av X, utan separat
                return null; // hanteras annorlunda
            }
        }

        function isOnStairs(door, px, py) {
            if (door.wall === 'stairsUp') {
                const sp = getStairPath(door);
                if (px < sp.topX - 10 || px > sp.bottomX + 10) return false;
                const expectedY = getStairY(door, px);
                return Math.abs(py - expectedY) < 40;
            } else {
                // Hål i golvet: man är på det om man står ovanpå det
                if (px < W / 2 - HOLE_W / 2 || px > W / 2 + HOLE_W / 2) return false;
                return py >= FLOOR_Y - 5 && py <= FLOOR_Y + HOLE_H;
            }
        }

        function getDoorRect(door) {
            const dw = 60, dh = 133; // 90x200cm
            if (door.wall === 'left')       return { x: 5, y: FLOOR_Y - 10, w: dw, h: dh };
            if (door.wall === 'right')      return { x: W - dw - 5, y: FLOOR_Y - 10, w: dw, h: dh };
            if (door.wall === 'stairsUp') {
                const sp = getStairPath(door);
                return { x: sp.topX, y: sp.topY, w: sp.bottomX - sp.topX, h: sp.bottomY - sp.topY };
            }
            if (door.wall === 'stairsDown') {
                return { x: W / 2 - HOLE_W / 2, y: FLOOR_Y, w: HOLE_W, h: HOLE_H };
            }
        }

        // === KARAKTÄR ===
        const player = {
            x: W / 2,
            y: FLOOR_Y + 40,
            size: 100,
            speed: 7,
            icon: '🧑',
            dir: 1,
            bobble: 0
        };
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
        });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // === SAKER ===
        const categories = {
            mobler: [
                { name: 'Soffa',      icon: '🛋️', w: 120, h: 53 },  // 180x80cm
                { name: 'Stol',       icon: '🪑', w: 30, h: 57 },   // 45x85cm
                { name: 'Bord',       icon: '🪵', w: 80, h: 50 },   // 120x75cm
                { name: 'Säng',       icon: '🛏️', w: 93, h: 67 },  // 140x100cm
                { name: 'Lampa',      icon: '💡', w: 23, h: 100 },  // 35x150cm
                { name: 'TV',         icon: '📺', w: 67, h: 40 },   // 100x60cm
                { name: 'Bokhylla',   icon: '📚', w: 53, h: 120 },  // 80x180cm
                { name: 'Skrivbord',  icon: '🖥️', w: 80, h: 50 },  // 120x75cm
                { name: 'Garderob',   icon: '🚪', w: 80, h: 133 },  // 120x200cm
                { name: 'Byrå',       icon: '🗄️', w: 53, h: 60 },  // 80x90cm
            ],
            badrum: [
                { name: 'Dusch',      icon: '🚿', w: 40, h: 140 }, // 60x210cm
                { name: 'Badkar',     icon: '🛁', w: 107, h: 53 }, // 160x80cm
                { name: 'Toalett',    icon: '🚽', w: 33, h: 50 },  // 50x75cm
                { name: 'Handfat',    icon: '🚰', w: 40, h: 53 },  // 60x80cm
            ],
            kok: [
                { name: 'Kylskåp',    icon: '🧊', w: 47, h: 120 }, // 70x180cm
                { name: 'Frys',       icon: '❄️', w: 47, h: 60 },  // 70x90cm
                { name: 'Spis',       icon: '🍳', w: 47, h: 60 },  // 70x90cm
                { name: 'Diskbänk',   icon: '🧽', w: 80, h: 47 },  // 120x70cm
            ],
            dekor: [
                { name: 'Tavla',      icon: '🖼️', w: 40, h: 33 },  // 60x50cm
                { name: 'Växt',       icon: '🪴', w: 20, h: 33 },   // 30x50cm
                { name: 'Blomma',     icon: '🌸', w: 20, h: 20 },   // 15x30cm (min 20)
                { name: 'Ljus',       icon: '🕯️', w: 30, h: 55 },
                { name: 'Klocka',     icon: '🕐', w: 40, h: 40 },
                { name: 'Nalle',      icon: '🧸', w: 45, h: 55 },
                { name: 'Matta',      icon: '🟤', w: 100, h: 67 },  // 150x100cm
                { name: 'Spegel',     icon: '🪞', w: 27, h: 40 },   // 40x60cm
                { name: 'Hjärta',     icon: '❤️', w: 20, h: 20 },   // dekor
                { name: 'Stjärna',    icon: '⭐', w: 20, h: 20 },   // dekor
            ],
        };

        const wallColors = [
            { name: 'Persika',    color: '#ffe6cc' },
            { name: 'Mint',       color: '#e6ffe6' },
            { name: 'Himmelsblå', color: '#cce6ff' },
            { name: 'Rosa',       color: '#ffe6f0' },
            { name: 'Lavendel',   color: '#e6ccff' },
            { name: 'Solsken',    color: '#ffffcc' },
            { name: 'Korall',     color: '#ffcccc' },
            { name: 'Vit',        color: '#ffffff' },
            { name: 'Grå',        color: '#e0e0e0' },
            { name: 'Mörkblå',    color: '#334466' },
        ];

        const floorColors = [
            { name: 'Trä',        color: '#c4956a' },
            { name: 'Mörkt trä',  color: '#8b6b4a' },
            { name: 'Ljust trä',  color: '#deb887' },
            { name: 'Sten',       color: '#b5a67a' },
            { name: 'Kakel vit',  color: '#d9d9d9' },
            { name: 'Kakel blå',  color: '#99bbcc' },
            { name: 'Matta röd',  color: '#cc6666' },
            { name: 'Matta blå',  color: '#6688aa' },
            { name: 'Matta grön', color: '#77aa77' },
            { name: 'Matta lila', color: '#9977aa' },
        ];

        // === STATE ===
        let currentTab = 'mobler';
        let selectedItem = null;
        let selectedScale = 1.0;
        let dragging = null;
        let dragOffX = 0, dragOffY = 0;
        let paletteItems = [];
        let selectedWallColor = null;
        let selectedFloorColor = null;
        let roomTransition = 0; // animation
        let pengar = 0;
        let showRating = false;
        let ratingScore = 0;
        let ratingTimer = 0;
        let mouseX = 0, mouseY = 0; // musposition för förhandsvisning

        function setTab(tab) {
            currentTab = tab;
            selectedItem = null;
            selectedScale = 1.0;
            selectedWallColor = null;
            selectedFloorColor = null;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + tab);
            if (btn) btn.classList.add('active');
            updateSizeControls();
        }

        function changeSize(delta) {
            selectedScale = Math.max(0.25, Math.min(3.0, selectedScale + delta));
            updateSizeControls();
        }

        function updateSizeControls() {
            const controls = document.getElementById('size-controls');
            const label = document.getElementById('size-label');
            if (selectedItem) {
                controls.style.display = 'flex';
                label.textContent = Math.round(selectedScale * 100) + '%';
            } else {
                controls.style.display = 'none';
            }
        }

        function roomHas(room, name) {
            return room.items.some(i => i.name === name);
        }

        function rateHouse() {
            let score = 0;
            const defaultWalls = ['#ffe6cc', '#e6ffe6', '#cce6ff', '#ffe6f0'];
            const defaultFloors = ['#c4956a', '#b5a67a', '#d9d9d9'];
            const vardagsrum = rooms[0];
            const kok = rooms[1];
            const sovrum = rooms[2];
            const badrum = rooms[3];
            const luck = Math.random();

            // Samla info
            let totalItems = 0;
            let roomsWithLight = 0;
            let roomsWithDekor = 0;
            let changedColors = 0;
            let roomsWithMatta = 0;
            let minItems = 999;
            for (const room of rooms) {
                totalItems += room.items.length;
                if (room.items.length < minItems) minItems = room.items.length;
                if (roomHas(room, 'Lampa') || roomHas(room, 'Ljus')) roomsWithLight++;
                if (room.items.some(i => ['Tavla','Växt','Blomma','Nalle','Hjärta','Stjärna','Klocka'].includes(i.name))) roomsWithDekor++;
                if (roomHas(room, 'Matta')) roomsWithMatta++;
                if (!defaultWalls.includes(room.wallColor)) changedColors++;
                if (!defaultFloors.includes(room.floorColor)) changedColors++;
            }

            // ⭐ 1: Grundmöbler - ibland räcker det med lite, ibland krävs mer
            const star1Options = [
                roomHas(sovrum, 'Säng') && roomHas(vardagsrum, 'Soffa'),
                roomHas(kok, 'Bord') && roomHas(kok, 'Stol'),
                totalItems >= 4 + Math.floor(luck * 4),
                roomHas(vardagsrum, 'Soffa') && roomHas(vardagsrum, 'TV'),
            ];
            if (star1Options[Math.floor(luck * star1Options.length)]) score++;

            // ⭐ 2: Rätt saker i rätt rum
            const star2Options = [
                roomHas(kok, 'Bord') && roomHas(kok, 'Stol') && roomHas(badrum, 'Toalett'),
                roomHas(sovrum, 'Säng') && roomHas(badrum, 'Handfat') && roomHas(vardagsrum, 'Soffa'),
                roomHas(badrum, 'Toalett') && roomHas(badrum, 'Handfat') && roomHas(sovrum, 'Säng'),
                roomHas(kok, 'Kylskåp') && roomHas(kok, 'Spis') && roomHas(sovrum, 'Säng'),
            ];
            if (score >= 1 && star2Options[Math.floor(luck * 7) % star2Options.length]) score++;

            // ⭐ 3: Belysning och dekor
            const needLights = 2 + Math.floor(luck * 3); // 2-4 rum
            const needDekor = 1 + Math.floor(luck * 2);  // 1-2 rum
            if (score >= 2 && roomsWithLight >= needLights && roomsWithDekor >= needDekor) score++;

            // ⭐ 4: Färger och fullt möblerat
            const needColors = 3 + Math.floor(luck * 4); // 3-6 ändrade
            const needPerRoom = 2 + Math.floor(luck * 2); // 2-3 per rum
            if (score >= 3 && changedColors >= needColors && minItems >= needPerRoom) score++;

            // ⭐ 5: Fullt hus - krav varierar
            const star5Options = [
                roomHas(sovrum, 'Garderob') && roomHas(vardagsrum, 'TV') && roomsWithMatta >= 2 && totalItems >= 20,
                rooms.some(r => roomHas(r, 'Bokhylla')) && (roomHas(badrum, 'Dusch') || roomHas(badrum, 'Badkar')) && totalItems >= 22,
                roomHas(badrum, 'Spegel') && roomHas(kok, 'Kylskåp') && roomHas(sovrum, 'Garderob') && totalItems >= 18,
                roomsWithMatta >= 2 && roomHas(vardagsrum, 'TV') && roomHas(vardagsrum, 'Bokhylla') && changedColors >= 6 && totalItems >= 24,
            ];
            if (score >= 4 && star5Options[Math.floor(luck * 13) % star5Options.length]) score++;

            ratingScore = score;
            pengar += score * 100;
            showRating = true;
            ratingTimer = 180;
        }

        // === UPPDATERA ===
        function updatePlayer() {
            if (roomTransition > 0) { roomTransition--; return; }

            let moving = false;
            let newX = player.x;
            let newY = player.y;
            const goUp = keys['ArrowUp'] || keys['w'] || keys['W'];
            const goDown = keys['ArrowDown'] || keys['s'] || keys['S'];
            const goLeft = keys['ArrowLeft'] || keys['a'] || keys['A'];
            const goRight = keys['ArrowRight'] || keys['d'] || keys['D'];

            // Kolla om spelaren redan är i en trappa
            const room = rooms[currentRoom];
            let inStairs = false;
            let stairDoor = null;
            for (const door of room.doors) {
                if (door.wall === 'stairsUp' || door.wall === 'stairsDown') {
                    if (isOnStairs(door, player.x, player.y)) {
                        inStairs = true;
                        stairDoor = door;
                        break;
                    }
                }
            }

            if (inStairs && stairDoor.wall === 'stairsUp') {
                // Trappa upp (snett längs väggen): vänster/upp = uppåt, höger/ner = nedåt
                if (goUp || goLeft)  { newX -= player.speed; player.dir = -1; moving = true; }
                if (goDown || goRight) { newX += player.speed; player.dir = 1; moving = true; }
                newX = Math.max(30, Math.min(W - 30, newX));
                const sy = getStairY(stairDoor, newX);
                if (sy !== null && isOnStairs(stairDoor, newX, sy)) {
                    newY = sy;
                } else {
                    newY = FLOOR_Y + 10;
                    inStairs = false;
                }
            } else {
                // På golvet: vanlig rörelse
                if (goUp)    { newY -= player.speed; moving = true; }
                if (goDown)  { newY += player.speed; moving = true; }
                if (goLeft)  { newX -= player.speed; player.dir = -1; moving = true; }
                if (goRight) { newX += player.speed; player.dir = 1; moving = true; }
                newX = Math.max(30, Math.min(W - 30, newX));
                newY = Math.max(FLOOR_Y + 10, Math.min(H - PAL_H - 30, newY));

                // Kolla om man gick in i en trappa upp (bara från botten, nära golvet)
                for (const door of room.doors) {
                    if (door.wall === 'stairsUp') {
                        const sp = getStairPath(door);
                        // Bara gå in i trappan om man är nära botten (höger sida, vid golvet)
                        if (newX > sp.bottomX - 30 && newX < sp.bottomX + 10 && newY <= FLOOR_Y + 20) {
                            inStairs = true;
                            stairDoor = door;
                            newY = getStairY(door, newX);
                            break;
                        }
                    }
                }
            }

            player.x = newX;
            player.y = newY;

            if (moving) player.bobble += 0.3;

            if (doorCooldown > 0) { doorCooldown--; return; }

            // Kolla dörrar och trappor
            for (const door of room.doors) {
                if (door.wall === 'stairsUp' && inStairs) {
                    const sp = getStairPath(door);
                    // Gick upp ut ur skärmen (nådde toppen)
                    if (player.y <= 10 || player.x <= sp.topX - 5) {
                        enterRoom(door);
                        return;
                    }
                }
                if (door.wall === 'stairsDown' && !inStairs) {
                    // Bara trigga om fötterna är på luckan (nära golvnivå OCH inom bredden)
                    if (player.x > W / 2 - HOLE_W / 2 && player.x < W / 2 + HOLE_W / 2 &&
                        player.y >= FLOOR_Y - 5 && player.y <= FLOOR_Y + 30) {
                        enterRoom(door);
                        return;
                    }
                }
                if (door.wall !== 'stairsUp' && door.wall !== 'stairsDown') {
                    const dr = getDoorRect(door);
                    if (player.x > dr.x && player.x < dr.x + dr.w &&
                        player.y > dr.y && player.y < dr.y + dr.h) {
                        enterRoom(door);
                        return;
                    }
                }
            }
        }

        let doorCooldown = 0;

        function enterRoom(door) {
            currentRoom = door.toRoom;
            roomTransition = 15;
            doorCooldown = 30;

            // Placera spelaren i mitten men mot rätt sida
            if (door.wall === 'left')       { player.x = W - 100; player.y = FLOOR_Y + 40; }
            if (door.wall === 'right')      { player.x = 100; player.y = FLOOR_Y + 40; }
            if (door.wall === 'stairsUp') {
                // Gick upp → hamna till vänster om luckan i rummet ovanför
                player.x = W / 2 - HOLE_W / 2 - 30;
                player.y = FLOOR_Y + 10;
            }
            if (door.wall === 'stairsDown') {
                // Gick ner → hamna högst upp i trappan i rummet under
                const newRoom = rooms[door.toRoom];
                const upDoor = newRoom.doors.find(d => d.wall === 'stairsUp');
                if (upDoor) {
                    const sp = getStairPath(upDoor);
                    // Nära toppen av trappan
                    player.x = sp.topX + 30;
                    player.y = getStairY(upDoor, sp.topX + 30);
                } else {
                    player.x = W / 2;
                    player.y = FLOOR_Y + 10;
                }
            }
        }

        // === RITA ===
        function draw() {
            const room = rooms[currentRoom];

            // Vägg
            ctx.fillStyle = room.wallColor;
            ctx.fillRect(0, 0, W, H);

            // Golv
            ctx.fillStyle = room.floorColor;
            ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

            // Golvlinje
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);
            ctx.lineTo(W, FLOOR_Y);
            ctx.stroke();

            // Väggkant / list
            ctx.fillStyle = 'rgba(0,0,0,0.06)';
            ctx.fillRect(0, FLOOR_Y - 8, W, 8);

            // Rumsnamn
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(room.name, W / 2, 15);

            // Rita dörrar
            for (const door of room.doors) {
                drawDoor(door);
            }

            // Rita placerade saker i detta rum
            for (const item of room.items) {
                drawPlacedItem(item);
            }

            // Rita spelaren
            drawPlayer();

            // Förhandsvisning av vald möbel (genomskinlig, med vald storlek)
            if (selectedItem && currentTab !== 'radera' && mouseY < H - PAL_H) {
                ctx.globalAlpha = 0.4;
                const sw = selectedItem.w * selectedScale;
                const sh = selectedItem.h * selectedScale;
                const drawer = itemDrawers[selectedItem.name] || dekorDrawers[selectedItem.name];
                if (drawer) {
                    drawer(mouseX - sw / 2, mouseY - sh / 2, sw, sh);
                } else {
                    const fontSize = Math.max(sw, sh);
                    ctx.font = `${fontSize}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(selectedItem.icon, mouseX, mouseY);
                }
                ctx.globalAlpha = 1;
            }

            // Rita paletten
            drawPalette();

            // Pengar och betygsknapp uppe till höger
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 3;
            ctx.fillText('💰 ' + pengar + ' kr', W - 60, 8);
            ctx.shadowBlur = 0;

            // Betygsknapp
            ctx.fillStyle = '#ff77aa';
            ctx.beginPath(); ctx.roundRect(W - 55, 4, 50, 24, 12); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⭐ Betyg', W - 30, 16);

            // Visa betyg om det just bedömts
            if (showRating && ratingTimer > 0) {
                ratingTimer--;
                if (ratingTimer <= 0) showRating = false;

                const alpha = ratingTimer > 30 ? 1 : ratingTimer / 30;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.beginPath(); ctx.roundRect(W / 2 - 130, H / 2 - 70, 260, 140, 15); ctx.fill();

                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Husets betyg!', W / 2, H / 2 - 40);

                // Stjärnor
                let stars = '';
                for (let i = 0; i < 5; i++) {
                    stars += i < ratingScore ? '⭐' : '☆';
                }
                ctx.font = '30px Arial';
                ctx.fillText(stars, W / 2, H / 2);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                if (ratingScore > 0) {
                    ctx.fillText('+' + (ratingScore * 100) + ' kr!', W / 2, H / 2 + 35);
                } else {
                    ctx.fillText('Dekorera mer!', W / 2, H / 2 + 35);
                }
                ctx.globalAlpha = 1;
            }

            // Transition-effekt
            if (roomTransition > 0) {
                ctx.fillStyle = `rgba(0,0,0,${roomTransition / 15 * 0.5})`;
                ctx.fillRect(0, 0, W, H);
            }
        }

        function drawDoor(door) {
            const dr = getDoorRect(door);

            if (door.wall === 'stairsUp' || door.wall === 'stairsDown') {
                drawStairs(dr, door);
                return;
            }

            // Dörrram (från sidan - mörk öppning i väggen)
            ctx.fillStyle = '#222';
            ctx.fillRect(dr.x, dr.y, dr.w, dr.h);

            // Dörrkarmen
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(dr.x, dr.y, dr.w, 5);        // överkarm
            ctx.fillRect(dr.x, dr.y, 5, dr.h);        // vänster karm
            ctx.fillRect(dr.x + dr.w - 5, dr.y, 5, dr.h); // höger karm

            // Öppen dörr (sedd från sidan - smal rektangel vinklad)
            const doorGrad = ctx.createLinearGradient(dr.x + 6, 0, dr.x + 6 + 15, 0);
            doorGrad.addColorStop(0, '#D2691E');
            doorGrad.addColorStop(1, '#A0522D');
            ctx.fillStyle = doorGrad;
            ctx.fillRect(dr.x + 6, dr.y + 5, 15, dr.h - 5);

            // Dörrhandtag (liten knopp på sidan)
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(dr.x + 20, dr.y + dr.h * 0.5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 3;
            ctx.fillText(door.label, dr.x + dr.w / 2, dr.y + dr.h + 14);
            ctx.shadowBlur = 0;
        }

        function drawStairs(dr, door) {
            if (door.wall === 'stairsDown') {
                drawStairsDown(dr, door);
                return;
            }
            drawStairsUp(dr, door);
        }

        function drawStairsUp(dr, door) {
            const sp = getStairPath(door);
            const steps = 8;

            // Trappsteg snett längs väggen
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const t2 = (i + 1) / steps;
                const x1 = sp.topX + t * (sp.bottomX - sp.topX);
                const y1 = sp.topY + t * (sp.bottomY - sp.topY);
                const x2 = sp.topX + t2 * (sp.bottomX - sp.topX);
                const y2 = sp.topY + t2 * (sp.bottomY - sp.topY);
                const stepW = 50;

                ctx.fillStyle = i % 2 === 0 ? '#c4956a' : '#b5876a';
                ctx.fillRect(x1 - stepW / 2, y1, stepW, 4);

                ctx.fillStyle = '#a07050';
                ctx.fillRect(x1 - stepW / 2, y1 + 4, stepW, y2 - y1 - 4);

                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(x1 - stepW / 2, y1 + 4, stepW, 3);
            }

            // Räcke
            ctx.strokeStyle = '#6B4513';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(sp.bottomX + 25, sp.bottomY);
            ctx.lineTo(sp.topX + 25, sp.topY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(sp.bottomX - 25, sp.bottomY);
            ctx.lineTo(sp.topX - 25, sp.topY);
            ctx.stroke();

            // Räckepinnar
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const px = sp.topX + t * (sp.bottomX - sp.topX);
                const py = sp.topY + t * (sp.bottomY - sp.topY);
                ctx.strokeStyle = '#8B6540';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px + 25, py);
                ctx.lineTo(px + 25, py - 25);
                ctx.stroke();
            }

            // Text
            const midX = (sp.topX + sp.bottomX) / 2;
            const midY = (sp.topY + sp.bottomY) / 2;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.shadowBlur = 4;
            ctx.fillText(door.label, midX, midY - 30);
            ctx.shadowBlur = 0;
        }

        function drawStairsDown(dr, door) {
            const hx = W / 2 - HOLE_W / 2;
            const hy = FLOOR_Y;

            // Hål i golvet - visa väggfärgen från rummet under
            const roomBelow = rooms[door.toRoom];
            ctx.fillStyle = roomBelow.wallColor;
            ctx.fillRect(hx, hy, HOLE_W, HOLE_H);

            // Trappsteg sedda ovanifrån, snett: börjar uppe till höger, går ner till vänster
            ctx.save();
            ctx.beginPath();
            ctx.rect(hx, hy, HOLE_W, HOLE_H);
            ctx.clip();

            const steps = 5;
            const stepW = HOLE_W / steps;
            const bottom = hy + HOLE_H; // nederkant av luckan

            for (let i = 0; i < steps; i++) {
                const sx = hx + i * stepW;
                // Första steget (vänster) är högst, varje steg blir kortare
                const stepH = HOLE_H - i * (HOLE_H / (steps + 1));
                const sy = bottom - stepH;
                const shade = (steps - i) / steps;
                const r = Math.floor(170 * shade + 30);
                const g = Math.floor(130 * shade + 20);
                const b = Math.floor(90 * shade + 15);

                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(sx + 2, sy, stepW - 3, stepH);

                ctx.fillStyle = `rgba(0,0,0,${0.15 * shade})`;
                ctx.fillRect(sx + 2, sy, 2, stepH);
            }

            ctx.restore();

            // Kant runt hålet
            ctx.strokeStyle = '#664433';
            ctx.lineWidth = 3;
            ctx.strokeRect(hx, hy, HOLE_W, HOLE_H);

            // Text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.shadowBlur = 4;
            ctx.fillText(door.label, W / 2, hy + HOLE_H + 16);
            ctx.shadowBlur = 0;
        }

        const itemDrawers = {

                // Armstöd

                ctx.fillRect(x, y + h * 0.3, 6, h * 0.55);

                ctx.fillStyle = '#885522';
                ctx.beginPath(); ctx.roundRect(x, y, w, h, 4); ctx.fill();
                // Madrass
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.roundRect(x + 3, y + 3, w - 6, h - 10, 3); ctx.fill();

                ctx.fillStyle = '#6699cc';
                ctx.beginPath(); ctx.roundRect(x + 3, y + h * 0.35, w - 6, h * 0.5, 3); ctx.fill();

            'Lampa': (x, y, w, h) => {
                // Fot
                ctx.fillStyle = '#888';
                ctx.beginPath(); ctx.roundRect(x + w * 0.25, y + h - 10, w * 0.5, 10, 2); ctx.fill();
                // Stång
                ctx.fillStyle = '#999';
                ctx.fillRect(x + w / 2 - 2, y + h * 0.3, 4, h * 0.65);
                // Lampskärm
                ctx.fillStyle = '#ffee99';
                ctx.beginPath();
                ctx.moveTo(x + w * 0.15, y + h * 0.35);
                ctx.lineTo(x + w * 0.85, y + h * 0.35);

                ctx.fill();

                ctx.lineTo(x, y + h * 0.7);
                ctx.closePath();
                ctx.fill();
            },
            'TV': (x, y, w, h) => {
                // Skärm
                ctx.fillStyle = '#222';
                ctx.beginPath(); ctx.roundRect(x, y, w, h * 0.75, 3); ctx.fill();
                // Skärmyta
                ctx.fillStyle = '#335';
                ctx.fillRect(x + 3, y + 3, w - 6, h * 0.75 - 6);
                // Reflektion
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.fillRect(x + 5, y + 5, w * 0.4, h * 0.3);
                // Fot
                ctx.fillStyle = '#333';
                ctx.fillRect(x + w / 2 - 8, y + h * 0.75, 16, h * 0.1);
                ctx.fillRect(x + w * 0.2, y + h * 0.85, w * 0.6, 4);
            },
            'Bokhylla': (x, y, w, h, seed) => {
                const s = seed || 0;
                const woodColors = ['#885522', '#774433', '#665533', '#886644'];
                const wi = Math.floor(s * woodColors.length) % woodColors.length;
                // Ramverk
                ctx.fillStyle = woodColors[wi];
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#774411';
                ctx.fillRect(x, y, 4, h);
                ctx.fillRect(x + w - 4, y, 4, h);
                // Hyllplan
                const shelves = 4;
                for (let i = 0; i <= shelves; i++) {
                    const sy = y + (i / shelves) * h;
                    ctx.fillStyle = '#996633';
                    ctx.fillRect(x, sy, w, 4);
                }
                // Böcker - slumpmässiga färger och bredder baserat på seed
                const colors = ['#cc3333','#3366cc','#33aa55','#ddaa33','#9944aa','#dd6633','#3399aa','#aa3366','#cc6699','#339966','#dd4444','#4477bb'];
                let rng = Math.floor(s * 10000);
                for (let shelf = 0; shelf < shelves; shelf++) {
                    const sy = y + (shelf / shelves) * h + 5;
                    const sh = (h / shelves) - 6;
                    let bx = x + 5;
                    const numBooks = 3 + (rng % 4);
                    for (let b = 0; b < numBooks; b++) {
                        rng = (rng * 31 + 7) % 1000;
                        const bw = 3 + rng % 5;
                        if (bx + bw > x + w - 5) break;
                        ctx.fillStyle = colors[rng % colors.length];
                        ctx.fillRect(bx, sy, bw, sh);
                        bx += bw + 1;
                    }
                }
            },
            'Skrivbord': (x, y, w, h) => {
                // Bordsskiva
                ctx.fillStyle = '#aa8855';
                ctx.beginPath(); ctx.roundRect(x, y, w, h * 0.2, 2); ctx.fill();
                // Ben
                ctx.fillStyle = '#886633';
                ctx.fillRect(x + 4, y + h * 0.2, 5, h * 0.8);
                ctx.fillRect(x + w - 9, y + h * 0.2, 5, h * 0.8);
                // Lådor på höger sida
                ctx.fillStyle = '#997744';
                ctx.fillRect(x + w - 25, y + h * 0.2, 20, h * 0.7);
                ctx.strokeStyle = '#886633';

                ctx.strokeRect(x + w - 25, y + h * 0.2, 20, h * 0.35);

                // Handtag

                ctx.fillRect(x + w - 18, y + h * 0.35, 8, 2);
                ctx.fillRect(x + w - 18, y + h * 0.7, 8, 2);
            },
            'Garderob': (x, y, w, h) => {
                // Stomme
                ctx.fillStyle = '#ddd';
                ctx.beginPath(); ctx.roundRect(x, y, w, h, 3); ctx.fill();
                // Dörrar
                ctx.fillStyle = '#eee';
                ctx.fillRect(x + 3, y + 3, w / 2 - 4, h - 6);
                ctx.fillRect(x + w / 2 + 1, y + 3, w / 2 - 4, h - 6);
                ctx.strokeStyle = '#bbb';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 3, y + 3, w / 2 - 4, h - 6);
                ctx.strokeRect(x + w / 2 + 1, y + 3, w / 2 - 4, h - 6);
                // Handtag
                ctx.fillStyle = '#999';
                ctx.beginPath(); ctx.arc(x + w / 2 - 6, y + h / 2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + w / 2 + 6, y + h / 2, 3, 0, Math.PI * 2); ctx.fill();

            'Byrå': (x, y, w, h) => {

                    ctx.fillStyle = '#ccc';
                    ctx.fillRect(x + w / 2 - 6, dy + dh / 2 - 1, 12, 3);
                }
                // Ben

                ctx.fillRect(x + 4, y + h, 5, 5);

            'Kylskåp': (x, y, w, h) => {

                // Underdel (frys)
                ctx.strokeRect(x + 3, y + h * 0.6 + 1, w - 6, h * 0.4 - 4);
                // Handtag
                ctx.fillStyle = '#999';
                ctx.beginPath(); ctx.roundRect(x + w - 10, y + h * 0.12, 4, h * 0.35, 2); ctx.fill();
                ctx.beginPath(); ctx.roundRect(x + w - 10, y + h * 0.65, 4, h * 0.22, 2); ctx.fill();
                // Linje mellan kyl och frys
                ctx.strokeStyle = '#999';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x + 2, y + h * 0.6); ctx.lineTo(x + w - 2, y + h * 0.6); ctx.stroke();

            'Frys': (x, y, w, h) => {

                ctx.beginPath(); ctx.roundRect(x + w - 10, y + h * 0.2, 4, h * 0.3, 2); ctx.fill();

            'Spis': (x, y, w, h) => {
                // Stomme (från sidan)

                // Topp/häll

                // Handtag

                ctx.lineWidth = 1;
                ctx.strokeRect(x + 3, y + 8, w / 2 - 4, h - 14);
                ctx.strokeRect(x + w / 2 + 1, y + 8, w / 2 - 4, h - 14);
                // Dörrhandtag
                ctx.fillStyle = '#ccc';
                ctx.beginPath(); ctx.arc(x + w / 2 - 6, y + h * 0.5, 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + w / 2 + 6, y + h * 0.5, 2, 0, Math.PI * 2); ctx.fill();
                // Bänkskiva
                ctx.fillStyle = '#bbb';
                ctx.fillRect(x - 2, y, w + 4, 7);
                // Diskho (inbuktning i bänkskivan)
                ctx.fillStyle = '#999';
                ctx.beginPath(); ctx.roundRect(x + w * 0.1, y + 1, w * 0.35, 5, 2); ctx.fill();
                // Kran (från sidan)
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x + w * 0.55, y + 3);
                ctx.lineTo(x + w * 0.55, y - 15);
                ctx.quadraticCurveTo(x + w * 0.55, y - 20, x + w * 0.45, y - 18);
                ctx.stroke();
            },
            'Dusch': (x, y, w, h) => {
                const cx = x + w / 2;
                // Stång
                const stangGrad = ctx.createLinearGradient(cx - 3, 0, cx + 3, 0);
                stangGrad.addColorStop(0, '#bbb');
                stangGrad.addColorStop(0.5, '#e0e0e0');
                stangGrad.addColorStop(1, '#aaa');
                ctx.fillStyle = stangGrad;
                // Rak del av stolpen
                ctx.fillRect(cx - 3, y + h * 0.08, 6, h * 0.92);
                // Böjd topp som går åt vänster mot duschhuvudet
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(cx, y + h * 0.1);
                ctx.quadraticCurveTo(cx, y, cx - w * 0.45, y + h * 0.02);
                ctx.stroke();
                // Rita igen med gradient-färg
                ctx.strokeStyle = '#bbb';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(cx, y + h * 0.1);
                ctx.quadraticCurveTo(cx, y, cx - w * 0.45, y + h * 0.02);
                ctx.stroke();
                // Fot
                ctx.fillStyle = '#aaa';
                ctx.beginPath(); ctx.roundRect(cx - 10, y + h - 5, 20, 5, 2); ctx.fill();
                // Duschikon
                ctx.save();
                ctx.translate(cx - w * 0.75, y + h * 0.06);
                ctx.rotate(-0.3);
                ctx.font = `${w * 0.8}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText('🚿', 0, 0);
                ctx.restore();
            },
            'Badkar': (x, y, w, h) => {
                // Badkar sett från sidan
                // Karet
                const karGrad = ctx.createLinearGradient(x, y, x, y + h);
                karGrad.addColorStop(0, '#fff');
                karGrad.addColorStop(1, '#ddd');
                ctx.fillStyle = karGrad;
                ctx.beginPath();
                ctx.moveTo(x + 8, y + h * 0.15);
                ctx.lineTo(x + w - 8, y + h * 0.15);
                ctx.quadraticCurveTo(x + w, y + h * 0.15, x + w, y + h * 0.4);
                ctx.lineTo(x + w, y + h * 0.85);
                ctx.quadraticCurveTo(x + w, y + h, x + w - 10, y + h);
                ctx.lineTo(x + 10, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h * 0.85);
                ctx.lineTo(x, y + h * 0.4);
                ctx.quadraticCurveTo(x, y + h * 0.15, x + 8, y + h * 0.15);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#bbb';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Kant ovanpå
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.roundRect(x + 2, y + h * 0.12, w - 4, 6, 3); ctx.fill();
                // Vatten inuti (syns ovanför kanten)
                ctx.fillStyle = 'rgba(100,180,255,0.2)';
                ctx.fillRect(x + 5, y + h * 0.18, w - 10, 8);
                // Kran (till höger, sticker upp)
                ctx.fillStyle = '#aaa';
                ctx.fillRect(x + w - 15, y, 4, h * 0.18);
                ctx.beginPath();
                ctx.moveTo(x + w - 15, y + 2);
                ctx.quadraticCurveTo(x + w - 15, y - 5, x + w - 22, y);
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 3;
                ctx.stroke();
                // Fötter
                ctx.fillStyle = '#999';
                ctx.beginPath(); ctx.ellipse(x + 10, y + h, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(x + w - 10, y + h, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
            },
            'Handfat': (x, y, w, h) => {
                // Handfat sett från sidan
                // Rör/ben under
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.35, y + h * 0.45);
                ctx.lineTo(x + w * 0.35, y + h * 0.75);
                ctx.quadraticCurveTo(x + w * 0.35, y + h, x + w * 0.5, y + h);
                ctx.stroke();
                // Fatet (från sidan - en skål)
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(x, y + h * 0.3);
                ctx.lineTo(x + w, y + h * 0.3);
                ctx.lineTo(x + w * 0.85, y + h * 0.5);
                ctx.quadraticCurveTo(x + w / 2, y + h * 0.58, x + w * 0.15, y + h * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#bbb';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Kran (sticker upp från sidan)
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x + w * 0.7, y + h * 0.3);
                ctx.lineTo(x + w * 0.7, y + h * 0.05);
                ctx.quadraticCurveTo(x + w * 0.7, y - 2, x + w * 0.55, y + h * 0.05);
                ctx.stroke();
                // Kranarmar
                ctx.fillStyle = '#88aaff';
                ctx.beginPath(); ctx.arc(x + w * 0.6, y + h * 0.2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ff6644';
                ctx.beginPath(); ctx.arc(x + w * 0.8, y + h * 0.2, 3, 0, Math.PI * 2); ctx.fill();
            },
        };

        const dekorDrawers = {
            'Tavla': (x, y, w, h, seed) => {
                const s = seed || 0;
                const ramColors = ['#aa8833', '#885522', '#666', '#994444', '#336655'];
                const bgColors = ['#aaddff', '#ffeedd', '#ddffdd', '#ffddee', '#ddeeff', '#ffffcc'];
                const landColors = ['#55aa55', '#aa5533', '#5566aa', '#aa8833', '#6644aa'];
                const ri = Math.floor(s * ramColors.length) % ramColors.length;
                const bi = Math.floor(s * 17) % bgColors.length;
                const li = Math.floor(s * 31) % landColors.length;
                // Ram
                ctx.fillStyle = ramColors[ri];
                ctx.fillRect(x, y, w, h);
                // Bild bakgrund
                ctx.fillStyle = bgColors[bi];
                ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
                // Motiv varierar
                const type = Math.floor(s * 100) % 4;
                if (type === 0) {
                    // Landskap med berg
                    ctx.fillStyle = landColors[li];
                    ctx.beginPath();
                    ctx.moveTo(x + 3, y + h * 0.65);
                    ctx.lineTo(x + w * 0.25, y + h * 0.25);
                    ctx.lineTo(x + w * 0.5, y + h * 0.5);
                    ctx.lineTo(x + w * 0.75, y + h * 0.2);
                    ctx.lineTo(x + w - 3, y + h * 0.6);
                    ctx.lineTo(x + w - 3, y + h - 3);
                    ctx.lineTo(x + 3, y + h - 3);
                    ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#ffdd44';
                    ctx.beginPath(); ctx.arc(x + w * 0.8, y + h * 0.18, 4, 0, Math.PI * 2); ctx.fill();
                } else if (type === 1) {
                    // Abstrakt med cirklar
                    const circColors = ['#ff6666','#66aaff','#ffcc33','#66dd66','#dd66dd'];
                    for (let i = 0; i < 4; i++) {
                        ctx.fillStyle = circColors[Math.floor((s * 100 + i * 7) % circColors.length)];
                        ctx.beginPath();
                        ctx.arc(x + 6 + (s * 50 + i * 12) % (w - 12), y + 6 + (s * 70 + i * 10) % (h - 12), 3 + i * 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (type === 2) {
                    // Solnedgång
                    const skyGrad = ctx.createLinearGradient(x, y + 3, x, y + h - 3);
                    skyGrad.addColorStop(0, '#ff8844');
                    skyGrad.addColorStop(0.5, '#ffcc66');
                    skyGrad.addColorStop(1, '#4466aa');
                    ctx.fillStyle = skyGrad;
                    ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
                    ctx.fillStyle = '#ff6622';
                    ctx.beginPath(); ctx.arc(x + w / 2, y + h * 0.45, 6, 0, Math.PI * 2); ctx.fill();
                } else {
                    // Blommor
                    ctx.fillStyle = '#55aa55';
                    ctx.fillRect(x + 3, y + h * 0.6, w - 6, h * 0.4 - 3);
                    const flowerColors = ['#ff4466','#ffaa33','#ff66cc','#aa44ff','#ff6644'];
                    for (let i = 0; i < 3; i++) {
                        const fx = x + 8 + (s * 80 + i * 15) % (w - 16);
                        const fy = y + h * 0.35 + (s * 40 + i * 8) % (h * 0.25);
                        ctx.strokeStyle = '#338833';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.moveTo(fx, fy + 8); ctx.lineTo(fx, y + h * 0.6); ctx.stroke();
                        ctx.fillStyle = flowerColors[Math.floor((s * 50 + i * 3) % flowerColors.length)];
                        ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#ffee55';
                        ctx.beginPath(); ctx.arc(fx, fy, 2, 0, Math.PI * 2); ctx.fill();
                    }
                }
            },
            'Växt': (x, y, w, h) => {
                const cx = x + w / 2;
                // Kruka
                const krukaGrad = ctx.createLinearGradient(x + w * 0.2, 0, x + w * 0.8, 0);
                krukaGrad.addColorStop(0, '#aa5533');
                krukaGrad.addColorStop(0.4, '#dd7744');
                krukaGrad.addColorStop(1, '#aa5533');
                ctx.fillStyle = krukaGrad;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.15, y + h * 0.55);
                ctx.lineTo(x + w * 0.25, y + h);
                ctx.lineTo(x + w * 0.75, y + h);
                ctx.lineTo(x + w * 0.85, y + h * 0.55);
                ctx.closePath();
                ctx.fill();
                // Krukakant
                ctx.fillStyle = '#cc7744';
                ctx.beginPath(); ctx.roundRect(x + w * 0.12, y + h * 0.52, w * 0.76, h * 0.06, 2); ctx.fill();
                // Jord
                ctx.fillStyle = '#553318';
                ctx.beginPath(); ctx.ellipse(cx, y + h * 0.57, w * 0.33, 5, 0, 0, Math.PI * 2); ctx.fill();
                // Stjälkar och blad
                ctx.strokeStyle = '#2d8a3e';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                // Mittenstjälk
                ctx.beginPath(); ctx.moveTo(cx, y + h * 0.55); ctx.quadraticCurveTo(cx - 2, y + h * 0.3, cx, y + h * 0.08); ctx.stroke();
                // Vänster stjälk
                ctx.beginPath(); ctx.moveTo(cx, y + h * 0.5); ctx.quadraticCurveTo(cx - w * 0.15, y + h * 0.3, cx - w * 0.3, y + h * 0.12); ctx.stroke();
                // Höger stjälk
                ctx.beginPath(); ctx.moveTo(cx, y + h * 0.48); ctx.quadraticCurveTo(cx + w * 0.15, y + h * 0.28, cx + w * 0.3, y + h * 0.1); ctx.stroke();
                // Blad (droppformade)
                const drawLeaf = (lx, ly, angle, size) => {
                    ctx.save();
                    ctx.translate(lx, ly);
                    ctx.rotate(angle);
                    const leafGrad = ctx.createLinearGradient(0, -size, 0, size);
                    leafGrad.addColorStop(0, '#44cc55');
                    leafGrad.addColorStop(1, '#228833');
                    ctx.fillStyle = leafGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -size);
                    ctx.bezierCurveTo(size * 0.6, -size * 0.5, size * 0.6, size * 0.3, 0, size);
                    ctx.bezierCurveTo(-size * 0.6, size * 0.3, -size * 0.6, -size * 0.5, 0, -size);
                    ctx.fill();
                    // Bladnerv
                    ctx.strokeStyle = 'rgba(0,80,0,0.3)';
                    ctx.lineWidth = 0.7;
                    ctx.beginPath(); ctx.moveTo(0, -size * 0.8); ctx.lineTo(0, size * 0.7); ctx.stroke();
                    ctx.restore();
                };
                drawLeaf(cx, y + h * 0.12, 0, 10);
                drawLeaf(cx - w * 0.18, y + h * 0.22, -0.4, 9);
                drawLeaf(cx + w * 0.18, y + h * 0.2, 0.4, 9);
                drawLeaf(cx - w * 0.3, y + h * 0.15, -0.7, 8);
                drawLeaf(cx + w * 0.3, y + h * 0.13, 0.7, 8);
                drawLeaf(cx - w * 0.1, y + h * 0.32, -0.2, 8);
                drawLeaf(cx + w * 0.12, y + h * 0.3, 0.3, 8);
            },
            'Blomma': (x, y, w, h, seed) => {
                const s = seed || 0;
                const petalColors = ['#ff66aa', '#ff4444', '#ffaa33', '#aa44ff', '#ff66ff', '#4488ff', '#ff8866', '#ffffff'];
                const midColors = ['#ffdd33', '#ffaa00', '#ff6633', '#ffffff'];
                const pi = Math.floor(s * petalColors.length) % petalColors.length;
                const mi = Math.floor(s * 17) % midColors.length;
                const numPetals = 4 + Math.floor(s * 37) % 4; // 4-7 kronblad
                const rotation = s * Math.PI * 2;
                // Stjälk
                ctx.strokeStyle = '#33aa33';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x + w / 2, y + h); ctx.lineTo(x + w / 2, y + h * 0.35); ctx.stroke();
                // Blad på stjälken
                ctx.fillStyle = '#44bb44';
                ctx.beginPath(); ctx.ellipse(x + w / 2 - 4, y + h * 0.65, 4, 2, -0.8, 0, Math.PI * 2); ctx.fill();
                // Kronblad
                const cx = x + w / 2, cy = y + h * 0.25;
                ctx.fillStyle = petalColors[pi];
                for (let a = 0; a < numPetals; a++) {
                    const angle = (a / numPetals) * Math.PI * 2 + rotation;
                    ctx.beginPath();
                    ctx.ellipse(cx + Math.cos(angle) * 6, cy + Math.sin(angle) * 6, 5, 3, angle, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Mitt
                ctx.fillStyle = midColors[mi];
                ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
            },
            'Matta': (x, y, w, h) => {
                ctx.fillStyle = '#cc5555';
                ctx.beginPath(); ctx.roundRect(x, y, w, h, 4); ctx.fill();
                // Mönster
                ctx.strokeStyle = '#dd8866';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 6, y + 4, w - 12, h - 8);
                ctx.strokeRect(x + 10, y + 7, w - 20, h - 14);
            },
            'Spegel': (x, y, w, h) => {
                // Yttre ram (ornament)
                const ramGrad = ctx.createLinearGradient(x, y, x + w, y + h);
                ramGrad.addColorStop(0, '#d4a840');
                ramGrad.addColorStop(0.3, '#f0d060');
                ramGrad.addColorStop(0.5, '#d4a840');
                ramGrad.addColorStop(0.7, '#f0d060');
                ramGrad.addColorStop(1, '#b8902a');
                ctx.fillStyle = ramGrad;
                ctx.beginPath(); ctx.roundRect(x, y, w, h, 5); ctx.fill();
                // Inre ram
                ctx.fillStyle = '#c49830';
                ctx.beginPath(); ctx.roundRect(x + 2, y + 2, w - 4, h - 4, 4); ctx.fill();
                // Glaset
                const glassGrad = ctx.createLinearGradient(x, y, x + w * 0.7, y + h);
                glassGrad.addColorStop(0, '#e8f0ff');
                glassGrad.addColorStop(0.3, '#f8fcff');
                glassGrad.addColorStop(0.6, '#dde8f4');
                glassGrad.addColorStop(1, '#c8d8e8');
                ctx.fillStyle = glassGrad;
                ctx.beginPath(); ctx.roundRect(x + 4, y + 4, w - 8, h - 8, 3); ctx.fill();
                // Reflektion (diagonalt ljus)
                ctx.save();
                ctx.beginPath(); ctx.roundRect(x + 4, y + 4, w - 8, h - 8, 3); ctx.clip();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath();
                ctx.moveTo(x + 4, y + 4);
                ctx.lineTo(x + w * 0.5, y + 4);
                ctx.lineTo(x + 4, y + h * 0.6);
                ctx.closePath();
                ctx.fill();
                // Liten extra glans
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.moveTo(x + w * 0.5, y + 4);
                ctx.lineTo(x + w * 0.7, y + 4);
                ctx.lineTo(x + 4, y + h * 0.85);
                ctx.lineTo(x + 4, y + h * 0.6);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                // Liten dekor på toppen av ramen
                ctx.fillStyle = '#d4a840';
                ctx.beginPath(); ctx.arc(x + w / 2, y + 1, 4, 0, Math.PI * 2); ctx.fill();
            },
            'Hjärta': (x, y, w, h) => {
                const cx = x + w / 2, cy = y + h * 0.35;
                ctx.fillStyle = '#ff4466';
                ctx.beginPath();
                ctx.moveTo(cx, y + h * 0.8);
                ctx.bezierCurveTo(cx - w * 0.5, y + h * 0.4, cx - w * 0.5, y, cx, y + h * 0.2);
                ctx.bezierCurveTo(cx + w * 0.5, y, cx + w * 0.5, y + h * 0.4, cx, y + h * 0.8);
                ctx.fill();
            },
            'Stjärna': (x, y, w, h) => {
                const cx = x + w / 2, cy = y + h / 2, r = Math.min(w, h) / 2 - 2;
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                    const px = cx + Math.cos(angle) * r;
                    const py = cy + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            },
        };

        function drawPlacedItem(item) {
            ctx.save();
            const drawer = itemDrawers[item.name] || dekorDrawers[item.name];
            if (drawer) {
                drawer(item.x, item.y, item.w, item.h, item.seed || 0);
            } else {
                // Fallback: emoji
                const fontSize = Math.max(item.w, item.h);
                ctx.font = `${fontSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.icon, item.x + item.w / 2, item.y + item.h / 2);
            }
            ctx.restore();

            if (currentTab === 'radera') {
                ctx.strokeStyle = 'rgba(255,0,0,0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.strokeRect(item.x - 2, item.y - 2, item.w + 4, item.h + 4);
                ctx.setLineDash([]);
            }
        }

        function drawPlayer() {
            ctx.save();
            const px = player.x;
            const py = player.y;
            const swing = Math.sin(player.bobble) * 0.5;
            const bounce = Math.abs(Math.sin(player.bobble)) * 3;
            const S = 1.6; // skala

            ctx.translate(px, py - bounce);
            ctx.scale(S, S);
            if (player.dir === -1) ctx.scale(-1, 1);

            // Skugga
            ctx.beginPath();
            ctx.ellipse(0, 30 + bounce / S, 16, 5, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fill();

            // === BEN ===
            // Vänster ben
            ctx.save();
            ctx.translate(-6, 14);
            ctx.rotate(swing);
            // Byxa
            const legGrad = ctx.createLinearGradient(0, 0, 0, 18);
            legGrad.addColorStop(0, '#3b5fc0');
            legGrad.addColorStop(1, '#2d4a99');
            ctx.fillStyle = legGrad;
            ctx.beginPath();
            ctx.roundRect(-5, 0, 10, 18, 2);
            ctx.fill();
            // Sko
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.roundRect(-4, 16, 12, 6, [0, 3, 3, 0]);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillRect(-2, 17, 8, 1.5);
            ctx.restore();

            // Höger ben
            ctx.save();
            ctx.translate(6, 14);
            ctx.rotate(-swing);
            ctx.fillStyle = legGrad;
            ctx.beginPath();
            ctx.roundRect(-5, 0, 10, 18, 2);
            ctx.fill();
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.roundRect(-4, 16, 12, 6, [0, 3, 3, 0]);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillRect(-2, 17, 8, 1.5);
            ctx.restore();

            // === KROPP ===
            const bodyGrad = ctx.createLinearGradient(0, -10, 0, 16);
            bodyGrad.addColorStop(0, '#dd2222');
            bodyGrad.addColorStop(1, '#aa1111');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.roundRect(-12, -10, 24, 26, 5);
            ctx.fill();

            // Krage
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(-6, -10);
            ctx.lineTo(0, -4);
            ctx.lineTo(6, -10);
            ctx.closePath();
            ctx.fill();

            // Knapp
            ctx.fillStyle = '#991111';
            ctx.beginPath();
            ctx.arc(0, 2, 2, 0, Math.PI * 2);
            ctx.fill();

            // === ARMAR ===
            // Vänster arm
            ctx.save();
            ctx.translate(-12, -5);
            ctx.rotate(-swing * 0.8);
            // Ärm
            ctx.fillStyle = '#dd2222';
            ctx.beginPath();
            ctx.roundRect(-4, 0, 8, 10, 2);
            ctx.fill();
            // Underarm/hand (hud)
            ctx.fillStyle = '#ffddaa';
            ctx.beginPath();
            ctx.roundRect(-3, 10, 7, 8, 2);
            ctx.fill();
            // Hand
            ctx.beginPath();
            ctx.arc(0, 19, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Höger arm
            ctx.save();
            ctx.translate(12, -5);
            ctx.rotate(swing * 0.8);
            ctx.fillStyle = '#dd2222';
            ctx.beginPath();
            ctx.roundRect(-4, 0, 8, 10, 2);
            ctx.fill();
            ctx.fillStyle = '#ffddaa';
            ctx.beginPath();
            ctx.roundRect(-3, 10, 7, 8, 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(1, 19, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // === HUVUD ===
            // Hals
            ctx.fillStyle = '#ffddaa';
            ctx.fillRect(-4, -14, 8, 6);

            // Huvud
            const headGrad = ctx.createRadialGradient(-3, -24, 2, 0, -22, 15);
            headGrad.addColorStop(0, '#ffe8c8');
            headGrad.addColorStop(1, '#ffcc99');
            ctx.fillStyle = headGrad;
            ctx.beginPath();
            ctx.ellipse(0, -22, 14, 15, 0, 0, Math.PI * 2);
            ctx.fill();

            // Öron
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.ellipse(-13, -20, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(13, -20, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Hår
            ctx.fillStyle = '#5C3317';
            ctx.beginPath();
            ctx.ellipse(0, -28, 15, 10, 0, Math.PI, 2 * Math.PI);
            ctx.fill();
            // Lugg
            ctx.beginPath();
            ctx.ellipse(-5, -33, 8, 5, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(4, -32, 6, 4, 0.3, 0, Math.PI * 2);
            ctx.fill();
            // Hår på sidorna
            ctx.beginPath();
            ctx.ellipse(-12, -24, 5, 8, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(12, -24, 5, 8, -0.2, 0, Math.PI * 2);
            ctx.fill();

            // Ögon
            // Vita
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(-5, -22, 5, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(5, -22, 5, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            // Iris
            ctx.fillStyle = '#5588cc';
            ctx.beginPath();
            ctx.arc(-4, -22, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -22, 2.5, 0, Math.PI * 2);
            ctx.fill();
            // Pupill
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(-4, -22, 1.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -22, 1.2, 0, Math.PI * 2);
            ctx.fill();
            // Ögonglans
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-3, -23, 0.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(7, -23, 0.8, 0, Math.PI * 2);
            ctx.fill();

            // Ögonbryn
            ctx.strokeStyle = '#4a2510';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(-5, -26, 5, 1.1 * Math.PI, 1.9 * Math.PI);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(5, -26, 5, 1.1 * Math.PI, 1.9 * Math.PI);
            ctx.stroke();

            // Näsa
            ctx.fillStyle = '#eebb88';
            ctx.beginPath();
            ctx.ellipse(1, -18, 2, 2.5, 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Mun / leende
            ctx.strokeStyle = '#cc4466';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.arc(1, -14, 5, 0.15 * Math.PI, 0.85 * Math.PI);
            ctx.stroke();

            // Kinder (rouge)
            ctx.fillStyle = 'rgba(255, 120, 140, 0.25)';
            ctx.beginPath();
            ctx.ellipse(-9, -17, 4, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(9, -17, 4, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPalette() {
            const palY = H - PAL_H;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, palY, W, PAL_H);

            paletteItems = [];

            if (currentTab === 'mobler' || currentTab === 'dekor' || currentTab === 'badrum' || currentTab === 'kok') {
                const items = categories[currentTab];
                const totalW = items.length * 62;
                const startX = Math.max(5, (W - totalW) / 2);

                items.forEach((item, i) => {
                    const ix = startX + i * 62;
                    const iy = palY + 5;
                    const iw = 56;
                    const ih = 45;

                    const isSelected = selectedItem && selectedItem.name === item.name;
                    if (isSelected) {
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(ix - 2, iy - 2, iw + 4, ih + 4);
                        ctx.strokeStyle = '#ff77aa';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(ix - 2, iy - 2, iw + 4, ih + 4);
                    }

                    ctx.font = '26px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.icon, ix + iw / 2, iy + 16);

                    ctx.fillStyle = '#ccc';
                    ctx.font = '9px Arial';
                    ctx.fillText(item.name, ix + iw / 2, iy + 38);

                    paletteItems.push({ x: ix, y: iy, w: iw, h: ih, item });
                });
            } else if (currentTab === 'vagar') {
                const totalW = wallColors.length * 62;
                const startX = Math.max(5, (W - totalW) / 2);
                wallColors.forEach((c, i) => {
                    const ix = startX + i * 62;
                    const iy = palY + 5;
                    const iw = 56, ih = 45;
                    ctx.fillStyle = c.color;
                    ctx.fillRect(ix + 8, iy + 2, 40, 24);
                    ctx.strokeStyle = selectedWallColor === c.color ? '#ff77aa' : '#666';
                    ctx.lineWidth = selectedWallColor === c.color ? 3 : 1;
                    ctx.strokeRect(ix + 8, iy + 2, 40, 24);
                    ctx.fillStyle = '#ccc';
                    ctx.font = '9px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(c.name, ix + iw / 2, iy + 40);
                    paletteItems.push({ x: ix, y: iy, w: iw, h: ih, wallColor: c.color });
                });
            } else if (currentTab === 'golv') {
                const totalW = floorColors.length * 62;
                const startX = Math.max(5, (W - totalW) / 2);
                floorColors.forEach((c, i) => {
                    const ix = startX + i * 62;
                    const iy = palY + 5;
                    const iw = 56, ih = 45;
                    ctx.fillStyle = c.color;
                    ctx.fillRect(ix + 8, iy + 2, 40, 24);
                    ctx.strokeStyle = selectedFloorColor === c.color ? '#ff77aa' : '#666';
                    ctx.lineWidth = selectedFloorColor === c.color ? 3 : 1;
                    ctx.strokeRect(ix + 8, iy + 2, 40, 24);
                    ctx.fillStyle = '#ccc';
                    ctx.font = '9px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(c.name, ix + iw / 2, iy + 40);
                    paletteItems.push({ x: ix, y: iy, w: iw, h: ih, floorColor: c.color });
                });
            } else if (currentTab === 'radera') {
                ctx.fillStyle = '#ff6666';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🗑️ Klicka på en sak för att ta bort den!', W / 2, palY + 27);
            }
        }

        // === KLICK-HANTERING ===
        function getCanvasPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (W / rect.width),
                y: (clientY - rect.top) * (H / rect.height)
            };
        }

        function getPaletteItemAt(x, y) {
            for (const p of paletteItems) {
                if (x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h) return p;
            }
            return null;
        }

        function getPlacedItemAt(x, y) {
            const items = rooms[currentRoom].items;
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                if (x >= item.x && x <= item.x + item.w && y >= item.y && y <= item.y + item.h) {
                    return { item, index: i };
                }
            }
            return null;
        }

        function handleDown(cx, cy) {
            // Betygsknapp (uppe till höger)
            if (cx >= W - 55 && cx <= W - 5 && cy >= 4 && cy <= 28) {
                rateHouse();
                return;
            }
            // Palett
            const pal = getPaletteItemAt(cx, cy);
            if (pal) {
                if (pal.item) { selectedItem = pal.item; selectedScale = 1.0; selectedWallColor = null; selectedFloorColor = null; }
                else if (pal.wallColor) { selectedWallColor = pal.wallColor; selectedItem = null; selectedFloorColor = null; }
                else if (pal.floorColor) { selectedFloorColor = pal.floorColor; selectedItem = null; selectedWallColor = null; }
                updateSizeControls();
                return;
            }

            const room = rooms[currentRoom];

            // Radera
            if (currentTab === 'radera') {
                const found = getPlacedItemAt(cx, cy);
                if (found) room.items.splice(found.index, 1);
                return;
            }

            // Väggfärg
            if (selectedWallColor) {
                room.wallColor = selectedWallColor;
                return;
            }

            // Golvfärg
            if (selectedFloorColor) {
                room.floorColor = selectedFloorColor;
                return;
            }

            // Dra befintlig sak
            const found = getPlacedItemAt(cx, cy);
            if (found) {
                dragging = found.item;
                dragOffX = cx - found.item.x;
                dragOffY = cy - found.item.y;
                room.items.splice(found.index, 1);
                room.items.push(dragging);
                return;
            }

            // Placera ny sak med vald storlek
            if (selectedItem && cy < H - PAL_H) {
                const sw = selectedItem.w * selectedScale;
                const sh = selectedItem.h * selectedScale;
                room.items.push({
                    icon: selectedItem.icon,
                    name: selectedItem.name,
                    x: cx - sw / 2,
                    y: cy - sh / 2,
                    w: sw,
                    h: sh,
                    seed: Math.random()
                });
            }
        }

        function handleMove(cx, cy) {
            if (dragging) {
                dragging.x = cx - dragOffX;
                dragging.y = cy - dragOffY;
            }
        }

        function handleUp() {
            dragging = null;
        }

        // === MUS ===
        canvas.addEventListener('mousedown', (e) => { handleDown(...Object.values(getCanvasPos(e.clientX, e.clientY))); });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getCanvasPos(e.clientX, e.clientY);
            mouseX = pos.x;
            mouseY = pos.y;
            handleMove(pos.x, pos.y);
        });
        canvas.addEventListener('mouseup', () => handleUp());

        // === TOUCH ===
        let playerTouch = { active: false, touchId: null, startX: 0, startY: 0, dx: 0, dy: 0 };

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                const pos = getCanvasPos(t.clientX, t.clientY);

                // Nedre vänstra = joystick för att gå
                if (pos.x < 140 && pos.y > H - PAL_H - 120 && pos.y < H - PAL_H) {
                    playerTouch.active = true;
                    playerTouch.touchId = t.identifier;
                    playerTouch.startX = pos.x;
                    playerTouch.startY = pos.y;
                    playerTouch.dx = 0;
                    playerTouch.dy = 0;
                    return;
                }

                mouseX = pos.x;
                mouseY = pos.y;
                handleDown(pos.x, pos.y);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === playerTouch.touchId && playerTouch.active) {
                    const pos = getCanvasPos(t.clientX, t.clientY);
                    playerTouch.dx = pos.x - playerTouch.startX;
                    playerTouch.dy = pos.y - playerTouch.startY;
                    const dist = Math.sqrt(playerTouch.dx ** 2 + playerTouch.dy ** 2);
                    if (dist > 40) {
                        playerTouch.dx = (playerTouch.dx / dist) * 40;
                        playerTouch.dy = (playerTouch.dy / dist) * 40;
                    }
                    keys['ArrowLeft'] = playerTouch.dx < -8;
                    keys['ArrowRight'] = playerTouch.dx > 8;
                    keys['ArrowUp'] = playerTouch.dy < -8;
                    keys['ArrowDown'] = playerTouch.dy > 8;
                    return;
                }
                const pos = getCanvasPos(t.clientX, t.clientY);
                handleMove(pos.x, pos.y);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === playerTouch.touchId) {
                    playerTouch.active = false;
                    playerTouch.touchId = null;
                    keys['ArrowLeft'] = false;
                    keys['ArrowRight'] = false;
                    keys['ArrowUp'] = false;
                    keys['ArrowDown'] = false;
                    return;
                }
            }
            handleUp();
        }, { passive: false });

        // === GAME LOOP ===
        function gameLoop() {
            updatePlayer();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
